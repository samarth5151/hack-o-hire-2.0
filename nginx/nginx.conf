server {
    listen 80;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── DLP Gateway API (/api/dlp → dlp-gateway:8001) ─────────────────────────
    location /api/dlp/ {
        proxy_pass         http://dlp-gateway:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Sandbox Harness API (/api/sandbox → sandbox-harness:8000) ────────────
    location /api/sandbox/ {
        proxy_pass         http://sandbox-harness:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Connection "";

        # SSE + large GGUF upload: disable ALL buffering
        proxy_buffering            off;
        proxy_request_buffering    off;
        proxy_cache                off;
        proxy_set_header           X-Accel-Buffering "no";

        # Generous timeouts: GGUF registration via Ollama can take many minutes
        proxy_read_timeout         1800s;
        proxy_send_timeout         1800s;
        proxy_connect_timeout      60s;

        # Large body for model uploads
        client_max_body_size       2048m;
    }

    # ── WebSocket for live DLP alerts ──────────────────────────────────────────
    location /ws/live {
        proxy_pass          http://dlp-gateway:8001/ws/live;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_read_timeout  86400s;
    }

    # ── Credential Scanner ────────────────────────────────────────────────────
    location /api/cred-scan/ {
        proxy_pass         http://credential-scanner:8002/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }

    # ── Prompt Guard ─────────────────────────────────────────────────────────
    location /api/prompt-guard/ {
        proxy_pass         http://prompt-guard:8005/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
    }

    # ── Voice Scanner ────────────────────────────────────────────────────────
    location /api/voice-scan/ {
        proxy_pass         http://voice-scanner:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }

    # ── Attachment Scanner ───────────────────────────────────────────────────
    location /api/attachment-scan/ {
        proxy_pass         http://attachment-scanner:8007/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
        client_max_body_size 100m;
    }

    # ── Website Spoofing ─────────────────────────────────────────────────────
    location /api/website-spoofing/ {
        proxy_pass         http://website-spoofing:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
    }

    # ── React SPA (catch-all) ──────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
