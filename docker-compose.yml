services:

  # ── Infrastructure (for dlp-gateway) ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dlp
      POSTGRES_PASSWORD: dlp
      POSTGRES_DB: dlp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dlp"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aegisai-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aegisai-net

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    networks:
      - aegisai-net

  # ── DLP Gateway (FastAPI on :8001) ─────────────────────────────────────────
  dlp-gateway:
    build:
      context: ./dlp-gateway
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file: ./dlp-gateway/.env
    environment:
      POSTGRES_URL: postgresql+asyncpg://dlp:dlp@postgres:5432/dlp
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
      OLLAMA_URL: http://sandbox-ollama:11434
    volumes:
      - ./dlp-gateway:/app
      - ./dlp-gateway/models:/app/models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped
    networks:
      - aegisai-net

  # ── Sandbox — Ollama LLM runtime ───────────────────────────────────────────
  sandbox-ollama:
    image: ollama/ollama:latest
    container_name: sandbox_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./sandbox/uploads:/uploads
    restart: unless-stopped
    networks:
      - aegisai-net

  # ── Sandbox — Model pre-loader (runs once) ─────────────────────────────────
  sandbox-loader:
    image: ollama/ollama:latest
    container_name: sandbox_loader
    depends_on:
      - sandbox-ollama
    entrypoint: >
      /bin/sh -c "
        sleep 15 &&
        OLLAMA_HOST=http://sandbox-ollama:11434 ollama pull tinyllama &&
        echo 'Model ready'
      "
    restart: "no"
    networks:
      - aegisai-net

  # ── Sandbox — Harness API (FastAPI on :8000) ───────────────────────────────
  sandbox-harness:
    build:
      context: ./sandbox
      dockerfile: docker/Dockerfile.harness
    container_name: sandbox_harness
    ports:
      - "8000:8000"
    volumes:
      - ./sandbox/results:/app/results
      - ./sandbox/payloads:/app/payloads
      - ./sandbox/reports:/app/reports
      - ./sandbox/ui:/app/ui
      - ./sandbox/uploads:/app/uploads
      - ./sandbox/uploads:/uploads
    environment:
      - OLLAMA_HOST=http://sandbox-ollama:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - UPLOADS_DIR=/uploads
      - RESULTS_DIR=/app/results
      - REPORTS_DIR=/app/reports
      - UI_DIR=/app/ui
    depends_on:
      - sandbox-ollama
    restart: unless-stopped
    networks:
      - aegisai-net

  # ── Credential Scanner ───────────────────────────────────────────────────
  credential-scanner:
    build:
      context: ./Credential_Scanner-main
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    restart: unless-stopped
    networks:
      - aegisai-net

  # ── Prompt Guard ─────────────────────────────────────────────────────────
  prompt-guard:
    build:
      context: ./fraudshield-prompt-guard
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    volumes:
      - ./prompt-injection/best_model:/app/prompt-injection/best_model:ro
      - ./fraudshield-prompt-guard/models:/root/.cache/huggingface
    environment:
      LOCAL_GUARD_MODEL_PATH: /app/prompt-injection/best_model
      OLLAMA_HOST: http://sandbox-ollama:11434
    depends_on:
      - sandbox-ollama
    restart: unless-stopped
    networks:
      - aegisai-net

  # ── Voice Scanner ────────────────────────────────────────────────────────
  voice-scanner:
    build:
      context: ./fraudshield-voice
      dockerfile: Dockerfile
    ports:
      - "8006:8000"
    environment:
      - OLLAMA_HOST=http://sandbox-ollama:11434
    depends_on:
      - sandbox-ollama
    restart: unless-stopped
    networks:
      - aegisai-net

  # ── Attachment Scanner ───────────────────────────────────────────────────
  attachment-scanner:
    build:
      context: ./attachment_scanner
      dockerfile: Dockerfile
    ports:
      - "8007:8007"
    restart: unless-stopped
    networks:
      - aegisai-net

  # ── Website Spoofing ─────────────────────────────────────────────────────
  website-spoofing:
    build:
      context: ./website_spoofing_model-main
      dockerfile: Dockerfile
    ports:
      - "8008:5000"
    restart: unless-stopped
    networks:
      - aegisai-net

  # ── Frontend — Node build step ─────────────────────────────────────────────
  frontend-builder:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/app/dist
    restart: "no"

  # ── Nginx — Unified reverse proxy + static frontend ───────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dlp-gateway
      - sandbox-harness
      - frontend-builder
      - credential-scanner
      - prompt-guard
      - voice-scanner
      - attachment-scanner
      - website-spoofing
    restart: unless-stopped
    networks:
      - aegisai-net

volumes:
  postgres_data:
  ollama_models:
  frontend_dist:

networks:
  aegisai-net:
    driver: bridge
